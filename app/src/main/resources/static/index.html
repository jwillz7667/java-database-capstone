<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinic - Select Your Role</title>
    <link rel="icon" href="./assets/images/logo/logo.png" />
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>
            <main class="main-content">
                <h2>Select Your Role</h2>
                <div class="role-buttons">
                    <button id="adminBtn" class="role-btn" onclick="selectRole('admin')">
                        <img src="./assets/images/defineRole/index.png" alt="Admin" />
                        <span>Admin</span>
                    </button>
                    <button id="doctorBtn" class="role-btn" onclick="selectRole('doctor')">
                        <img src="./assets/images/defineRole/index.png" alt="Doctor" />
                        <span>Doctor</span>
                    </button>
                    <button id="patientBtn" class="role-btn" onclick="selectRole('patient')">
                        <img src="./assets/images/defineRole/index.png" alt="Patient" />
                        <span>Patient</span>
                    </button>
                </div>
            </main>
            <div id="footer"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <span id="closeModal" class="close">&times;</span>
        <div id="modal-body"></div>
    </div>

    <script type="module" src="./js/services/index.js" defer></script>
</body>
</html>
