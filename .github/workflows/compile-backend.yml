name: Compile Back-End

on:
  push:
  pull_request:

jobs:
  compile-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compile with Maven
        run: |
          cd app
          mvn clean compile