name: Lint Back-End

on:
  push:
  pull_request:

jobs:
  lint-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Checkstyle
        run: curl -L -o checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.21.4/checkstyle-10.21.4-all.jar

      - name: Run Checkstyle
        run: java -jar checkstyle.jar -c /google_checks.xml app/src/main/java/com/project/back_end/ || true